<!doctype html>
<!--
  ============================================================================
  progress-report-tt — bilingual (EN/JA) Kanban progress dashboard template
  ============================================================================
  Derived from ~/.claude/skills/html-output/templates/base.html and the prior
  document-style report template. Adopts the Google Cloud Docs (devsite) design
  system (~/.claude/design-md/google/DESIGN.md): Google Sans headings, Roboto
  body, devsite light/dark tokens, subtle elevation, Google brand status colors
  (Blue #4285f4 / Red #ea4335 / Yellow #fbbc04 / Green #34a853).

  This is a DATA-DRIVEN template: all report content lives in one embedded JSON
  blob (see the REPORT_DATA_JSON token below). A single JS pass parses it and
  renders the header period/note, the summary cards, and the three-column
  Kanban board for the CURRENTLY selected language. The EN/JA toggle re-renders
  and swaps document.title + <html lang>.

  PLACEHOLDER TOKENS — the generating skill string-replaces each token below.
  In the markup, tokens are wrapped in double braces. In THIS comment they are
  written WITHOUT braces on purpose: a previous bug wrapped token names in
  double braces inside a comment and a global find-and-replace duplicated the
  whole report body into the comment. Never write a double-brace sequence here.
    GENERATED_AT_ISO   ISO-8601 UTC timestamp, e.g. 2026-07-11T09:00:00Z.
                       Emitted ONLY in the html-output-generation meta tag; the
                       page shows no dates or times (report is a snapshot).
    TITLE_EN           Report title, English.  (see TOKEN NOTE below)
    TITLE_JA           Report title, Japanese. (see TOKEN NOTE below)
    REPORT_DATA_JSON   The report data, a single JSON object (schema below).
                       The fill script escapes "</" as "<\/" so the JSON can
                       never terminate the surrounding <script> element early.

  TOKEN NOTE: TITLE_EN / TITLE_JA are also embedded in a JS string literal in
  the head language-init TITLES map, so they must not contain an unescaped
  double quote or backslash. GENERATED_AT_ISO is a bare ISO string with no
  quotes/backslashes. REPORT_DATA_JSON is valid JSON (double-quoted keys).

  JSON SCHEMA (bilingual values are objects like en/ja; single braces shown):
    {
      "period": {en, ja},                         // header period label
      "note":   {en, ja},                         // header one-line method note
      "summaryCards": [ {
        "id": str,
        "title":    {en, ja},                     // small eyebrow label
        "headline": {en, ja},                     // prominent line
        "badge":  { "label": {en, ja}, "href": str }?,          // optional
        "meter":  { "value": int, "total": int, "label": {en, ja} }?, // optional
        "rows": [ {
          "label":  {en, ja},
          "status": "done" | "doing" | "todo" | "none",
          "note":   {en, ja}?                     // optional
        } ]
      } ],
      "board": { "todo": [CARD], "doing": [CARD], "done": [CARD] }
    }
    CARD = {
      "id":      str,
      "tag":     {en, ja},
      "date":    {en, ja}?,                        // optional
      "title":   {en, ja},
      "summary": {en, ja},                          // HTML string (trusted)
      "detail":  {en, ja}                           // HTML string (trusted)
    }
  Status meaning: done = mastery/complete, doing = in progress, todo = planned,
  none = no status (a plain note row). Chip rendering pairs COLOR + SYMBOL +
  TEXT so status never relies on color alone. "summary" and "detail" values are
  trusted HTML generated by the skill (ul/li/code/a allowed) and injected with
  innerHTML; every other string field is inserted as plain text.
  ============================================================================
-->
<html lang="en" data-color-scheme="auto" data-lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- Keep the published page out of search engines; the URL is shared directly. -->
<meta name="robots" content="noindex, nofollow" />
<!-- Generation marker: a fresh ISO timestamp on every regenerate. -->
<meta name="html-output-generation" content="2026-07-21T15:04:39Z" />
<!-- Theme init: apply the saved color scheme before first paint to avoid a
     flash of the wrong theme (FOUC). Must run here in <head> and BEFORE the
     external font stylesheet below — a sync script is blocked until preceding
     external stylesheets load, so placing it after the <link> would delay the
     attribute set and reintroduce the flash. localStorage access is guarded
     because some contexts (private mode, blocked storage) throw on access. -->
<script>
  (function () {
    try {
      const saved = localStorage.getItem("html-output-color-scheme");
      if (saved === "dark" || saved === "light") {
        document.documentElement.setAttribute("data-color-scheme", saved);
      }
    } catch (e) {}
  })();
</script>
<title>Progress Report</title>
<!-- Language init: apply the saved EN/JA choice before first paint so the
     correct language renders immediately (no flash of the wrong language).
     Runs AFTER the <title> above so its document.title assignment wins, and
     BEFORE the external font stylesheet for the same no-FOUC reason as the
     theme script. Default language is "en". -->
<script>
  (function () {
    const TITLES = { en: "Progress Report", ja: "進捗レポート" };
    let lang = "en";
    try {
      const saved = localStorage.getItem("progress-report-tt-lang");
      if (saved === "en" || saved === "ja") lang = saved;
    } catch (e) {}
    const html = document.documentElement;
    html.setAttribute("data-lang", lang);
    html.setAttribute("lang", lang);
    try { document.title = TITLES[lang]; } catch (e) {}
  })();
</script>
<!-- Google Cloud Docs Design System (devsite) web fonts.
     Keep this link per ~/.claude/design-md/google/DESIGN.md; the font stacks
     below include system fallbacks for offline viewing. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500;700&family=Roboto+Mono&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     Design tokens — Google Cloud Docs Design System (devsite)
     per ~/.claude/design-md/google/DESIGN.md (global CLAUDE.md design section).
     Light = default (devsite body #f8f9fa), Dark = #202124.
     ============================================================ */
  :root {
    /* Background tiers */
    --background-0: #e8eaed;
    --background-1: #ffffff;
    --background-2: #f8f9fa;
    --background-3: #f1f3f4;
    --background-4: #e8eaed;
    --background-5: #dadce0;

    --bg:        #f8f9fa;   /* devsite body background (not pure white) */
    --surface:   #ffffff;   /* cards, panels, dialog */
    --surface-container: #f8f9fa;

    --text:          #202124;
    --text-muted:    #5f6368;
    --text-tertiary: #bdc1c6;
    --heading:       #202124;

    --outline:         #dadce0;
    --outline-variant: #e8eaed;

    --primary:        #1a73e8;
    --primary-hover:  #1765cc;
    --on-primary:     #ffffff;
    --link:           #1a73e8;
    --link-hover:     #1765cc;
    --link-bg-active: #e8f0fe;

    /* Google Brand Colors (fixed across modes) */
    --google-blue:   #4285f4;
    --google-red:    #ea4335;
    --google-yellow: #fbbc04;
    --google-green:  #34a853;

    /* Chips (devsite bg/color pairs — readable in both modes: tinted bg + dark
       text in light, and light bg + dark text in dark per devsite dark-theme). */
    --chip-blue-bg:   #e8f0fe; --chip-blue-color:   #174ea6;
    --chip-green-bg:  #e6f4ea; --chip-green-color:  #0d652d;
    --chip-red-bg:    #fce8e6; --chip-red-color:    #a50e0e;
    --chip-yellow-bg: #fef7e0; --chip-yellow-color: #a50e0e;
    --chip-grey-bg:   #f1f3f4;

    /* Elevation (devsite: subtle) */
    --shadow-ambient: rgba(60, 64, 67, 0.15);
    --shadow-key:     rgba(60, 64, 67, 0.3);
    --elevation-1: 0 1px 2px 0 var(--shadow-key), 0 1px 3px 1px var(--shadow-ambient);
    --elevation-3: 0 1px 3px 0 var(--shadow-key), 0 4px 8px 3px var(--shadow-ambient);

    /* Shape (devsite: card 8px, input/chip 4px, button pill) */
    --radius-sm: 4px;
    --radius:    8px;
    --radius-lg: 12px;
    --corner-full: 9999px;

    /* Spacing (4px grid) */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-6: 24px;
    --space-8: 32px;
    --space-12: 48px;

    /* Typography (devsite: Google Sans headings, Roboto body) */
    --font-headline: 'Google Sans', 'Noto Sans', 'Noto Sans JP', 'Hiragino Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-sans: 'Roboto', 'Noto Sans', 'Noto Sans JP', 'Hiragino Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'Roboto Mono', ui-monospace, "SF Mono", Menlo, Consolas, 'Noto Sans JP', 'Hiragino Sans', monospace;

    --max-w: 1100px;  /* board main column width */
  }

  /* Dark mode (devsite dark-theme.css values) */
  html[data-color-scheme="dark"] {
    --background-0: #202124;
    --background-1: #2a2b2e;
    --background-2: #303134;
    --background-3: #36373a;
    --background-4: #38393c;
    --background-5: #3c3d40;

    --bg:        #202124;
    --surface:   #2a2b2e;
    --surface-container: #303134;

    --text:          #e8eaed;
    --text-muted:    #9aa0a6;
    --text-tertiary: #5f6368;
    --heading:       #e8eaed;

    --outline:         #3c4043;
    --outline-variant: #2d2e31;

    --primary:        #8ab4f8;
    --primary-hover:  #98bdf9;
    --on-primary:     #202124;
    --link:           #8ab4f8;
    --link-hover:     #98bdf9;
    --link-bg-active: #3c3e43;

    --chip-blue-bg:   #cad1dd; --chip-blue-color:   #1b3c72;
    --chip-green-bg:  #c8d4cc; --chip-green-color:  #154a29;
    --chip-red-bg:    #dbcac9; --chip-red-color:    #701617;
    --chip-yellow-bg: #ddd7c4; --chip-yellow-color: #701617;
    --chip-grey-bg:   #3c3d40;

    --shadow-ambient: rgba(0, 0, 0, 0.15);
    --shadow-key:     rgba(0, 0, 0, 0.3);
  }

  /* Auto = follow OS */
  @media (prefers-color-scheme: dark) {
    html[data-color-scheme="auto"] {
      --background-0: #202124;
      --background-1: #2a2b2e;
      --background-2: #303134;
      --background-3: #36373a;
      --background-4: #38393c;
      --background-5: #3c3d40;

      --bg:        #202124;
      --surface:   #2a2b2e;
      --surface-container: #303134;

      --text:          #e8eaed;
      --text-muted:    #9aa0a6;
      --text-tertiary: #5f6368;
      --heading:       #e8eaed;

      --outline:         #3c4043;
      --outline-variant: #2d2e31;

      --primary:        #8ab4f8;
      --primary-hover:  #98bdf9;
      --on-primary:     #202124;
      --link:           #8ab4f8;
      --link-hover:     #98bdf9;
      --link-bg-active: #3c3e43;

      --chip-blue-bg:   #cad1dd; --chip-blue-color:   #1b3c72;
      --chip-green-bg:  #c8d4cc; --chip-green-color:  #154a29;
      --chip-red-bg:    #dbcac9; --chip-red-color:    #701617;
      --chip-yellow-bg: #ddd7c4; --chip-yellow-color: #701617;
      --chip-grey-bg:   #3c3d40;

      --shadow-ambient: rgba(0, 0, 0, 0.15);
      --shadow-key:     rgba(0, 0, 0, 0.3);
    }
  }

  /* ============================================================
     Bilingual EN/JA toggle for STATIC chrome (title, generated label).
     Elements tagged data-lang="en"/"ja" show only for the active language.
     JSON-driven content is rendered imperatively in the active language, so
     it does not rely on these rules. The toggle buttons carry NO data-lang
     attribute, so they always stay visible.
     ============================================================ */
  html[data-lang="en"] [data-lang="ja"] { display: none; }
  html[data-lang="ja"] [data-lang="en"] { display: none; }

  /* ========== Base ========== */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 20px;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  h1, h2, h3, h4 { margin: 0; color: var(--heading); font-family: var(--font-headline); letter-spacing: 0; }
  a { color: var(--link); text-decoration: none; }
  a:hover { color: var(--link-hover); text-decoration: underline; }
  code {
    font-family: var(--font-mono);
    font-size: 0.92em;
    background: var(--background-3);
    border-radius: var(--radius-sm);
    padding: 2px 4px;
  }

  /* ========== Page shell ========== */
  .page {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: var(--space-12) var(--space-6);
    display: flex;
    flex-direction: column;
    gap: var(--space-8);
  }

  /* ========== Header ========== */
  .report-header {
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-bottom: 1px solid var(--outline);
    padding-bottom: var(--space-4);
  }
  .report-header h1 { font: 500 36px/44px var(--font-headline); }
  .report-period { font: 400 14px/20px var(--font-sans); color: var(--text); }
  .report-note { font: 400 13px/18px var(--font-sans); color: var(--text-muted); margin: 0; }

  /* ========== Summary cards ========== */
  .summary-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: var(--space-4);
  }
  @media (max-width: 720px) {
    .summary-cards { grid-template-columns: 1fr; }
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--outline);
    border-radius: var(--radius);
    padding: var(--space-4) var(--space-6);
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
  }
  .summary-card__title {
    font: 500 12px/16px var(--font-sans);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }
  .summary-card__headline { font: 400 20px/28px var(--font-headline); color: var(--heading); }
  .summary-card__badge {
    align-self: flex-start;
    display: inline-block;
    font: 500 12px/16px var(--font-sans);
    padding: 3px 10px;
    border-radius: var(--corner-full);
    background: var(--chip-blue-bg);
    color: var(--chip-blue-color);
    text-decoration: none;
  }
  .summary-card__badge:hover { text-decoration: underline; color: var(--chip-blue-color); }

  /* Meter: thin bar + green fill on muted track, with a written value/total. */
  .meter { display: flex; align-items: center; gap: var(--space-3); margin: var(--space-1) 0; }
  .meter__track {
    flex: 1;
    height: 6px;
    background: var(--background-3);
    border-radius: 4px;
    overflow: hidden;
  }
  .meter__fill { height: 100%; background: var(--google-green); border-radius: 4px; }
  .meter__text { font: 500 12px/16px var(--font-sans); color: var(--text-muted); white-space: nowrap; }

  /* Card rows: label + status chip + optional note. */
  .card-rows { list-style: none; margin: var(--space-1) 0 0; padding: 0; display: flex; flex-direction: column; gap: var(--space-2); }
  .card-row { display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap; }
  .card-row__label { font: 400 14px/20px var(--font-sans); color: var(--text); }
  .card-row__note { font: 400 12px/16px var(--font-sans); color: var(--text-muted); }

  /* ========== Status chip (color + symbol + text; never color alone) ========== */
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font: 500 12px/16px var(--font-sans);
    padding: 2px 8px;
    border-radius: var(--radius-sm);
    white-space: nowrap;
  }
  .chip__sym { font-size: 11px; line-height: 1; }
  .chip--done  { background: var(--chip-green-bg);  color: var(--chip-green-color); }
  .chip--doing { background: var(--chip-yellow-bg); color: var(--chip-yellow-color); }
  .chip--todo  { background: var(--chip-blue-bg);   color: var(--chip-blue-color); }
  .chip--none  { background: var(--chip-grey-bg);   color: var(--text-muted); border: 1px solid var(--outline); }

  /* ========== Kanban board ========== */
  .board { display: grid; grid-template-columns: 1fr; gap: var(--space-4); }
  @media (min-width: 900px) {
    .board { grid-template-columns: repeat(3, 1fr); align-items: start; }
  }
  .column {
    background: var(--surface-container);
    border: 1px solid var(--outline-variant);
    border-radius: var(--radius);
    padding: var(--space-3);
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
    min-width: 0;
  }
  .column__header { display: flex; align-items: center; justify-content: space-between; gap: var(--space-2); padding: 0 var(--space-1); }
  .column__title { font: 500 14px/20px var(--font-headline); color: var(--heading); }
  .column__count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 24px;
    height: 20px;
    padding: 0 6px;
    border-radius: var(--corner-full);
    background: var(--background-3);
    color: var(--text-muted);
    font: 500 12px/1 var(--font-sans);
  }
  .column__cards { display: flex; flex-direction: column; gap: var(--space-3); }
  .column__empty { font: 400 12px/16px var(--font-sans); color: var(--text-tertiary); padding: var(--space-2) var(--space-1); }

  /* Kanban card (a real <button> — keyboard accessible by default). */
  .kanban-card {
    display: block;
    width: 100%;
    text-align: left;
    background: var(--surface);
    border: 1px solid var(--outline);
    border-radius: var(--radius);
    padding: var(--space-3) var(--space-4);
    cursor: pointer;
    font-family: var(--font-sans);
    color: var(--text);
    transition: box-shadow .15s ease, border-color .15s ease, transform .05s ease;
  }
  .kanban-card:hover { box-shadow: var(--elevation-1); border-color: var(--primary); }
  .kanban-card:active { transform: translateY(1px); }
  .kanban-card:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
  .kanban-card__head { display: flex; align-items: center; justify-content: space-between; gap: var(--space-2); }
  /* Tag chip on kanban cards is NEUTRAL — column position conveys status. */
  .kanban-card__tag {
    display: inline-block;
    font: 500 11px/16px var(--font-sans);
    padding: 1px 8px;
    border: 1px solid var(--outline);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    background: var(--background-1);
  }
  html[data-color-scheme="dark"] .kanban-card__tag { background: var(--background-3); }
  @media (prefers-color-scheme: dark) {
    html[data-color-scheme="auto"] .kanban-card__tag { background: var(--background-3); }
  }
  .kanban-card__date { font: 400 11px/16px var(--font-sans); color: var(--text-tertiary); }
  .kanban-card__title { font: 500 14px/20px var(--font-headline); color: var(--heading); margin: var(--space-2) 0 0; }
  .kanban-card__summary {
    margin: var(--space-1) 0 0;
    font: 400 13px/18px var(--font-sans);
    color: var(--text-muted);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .kanban-card__affordance { display: inline-block; margin-top: var(--space-2); font: 500 12px/16px var(--font-sans); color: var(--primary); }

  /* ========== Dialog (card detail) ========== */
  .card-dialog {
    width: min(92vw, 560px);
    max-height: 85vh;
    padding: 0;
    border: 1px solid var(--outline);
    border-radius: var(--radius-lg);
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--elevation-3);
  }
  .card-dialog::backdrop { background: rgba(0, 0, 0, 0.5); }
  .dialog-body { padding: var(--space-6); max-height: 85vh; overflow-y: auto; }
  .dialog-head { display: flex; align-items: center; gap: var(--space-2); margin-bottom: var(--space-3); }
  .dialog-head .kanban-card__tag { cursor: default; }
  .dialog-date { font: 400 12px/16px var(--font-sans); color: var(--text-muted); }
  .dialog-close {
    margin-left: auto;
    width: 32px;
    height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--outline);
    border-radius: var(--corner-full);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
  }
  .dialog-close:hover { background: var(--background-3); color: var(--text); }
  .dialog-close:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
  .dialog-title { font: 400 24px/32px var(--font-headline); color: var(--heading); margin: 0 0 var(--space-4); }

  /* Rich-text styles scoped to the trusted detail HTML. */
  .dialog-detail { font: 400 14px/22px var(--font-sans); color: var(--text); }
  .dialog-detail > :first-child { margin-top: 0; }
  .dialog-detail > :last-child { margin-bottom: 0; }
  .dialog-detail p { margin: 0 0 var(--space-3); }
  .dialog-detail ul, .dialog-detail ol { margin: 0 0 var(--space-3); padding-left: 22px; }
  .dialog-detail li { margin: 0 0 var(--space-1); }
  .dialog-detail h4 { font: 500 14px/20px var(--font-sans); color: var(--text); margin: var(--space-4) 0 var(--space-2); }
  .dialog-detail a { color: var(--link); }
  .dialog-detail code { background: var(--background-3); }

  /* ========== Top-right controls (theme + language toggles) ========== */
  .theme-toggle {
    position: fixed;
    top: var(--space-4);
    right: var(--space-4);
    z-index: 100;
    width: 36px; height: 36px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--outline);
    border-radius: var(--corner-full);
    cursor: pointer;
    font-size: 16px;
    user-select: none;
    transition: background .15s ease, border-color .15s ease;
  }
  .theme-toggle:hover { background: var(--background-3); border-color: var(--primary); }
  .theme-toggle .icon-sun { display: none; }
  .theme-toggle .icon-moon { display: block; }
  html[data-color-scheme="dark"] .theme-toggle .icon-sun { display: block; }
  html[data-color-scheme="dark"] .theme-toggle .icon-moon { display: none; }
  @media (prefers-color-scheme: dark) {

    }

    // Status descriptors: color class + symbol + bilingual label. Status is
    // conveyed by ALL THREE (color, symbol, text), never color alone.
    var STATUS = {
      done:  { sym: "✓", cls: "chip--done",  label: { en: "Done",        ja: "完了" } },
      doing: { sym: "●", cls: "chip--doing", label: { en: "In progress", ja: "進行中" } },
      todo:  { sym: "○", cls: "chip--todo",  label: { en: "Planned",     ja: "予定" } },
      none:  { sym: "–", cls: "chip--none",  label: { en: "None",        ja: "なし" } }
    };
    // Kanban column keys and their English titles (kept English in both langs,
    // per Kanban convention).
    var COLUMNS = [
      { key: "todo",  title: "To-do" },
      { key: "doing", title: "On-going" },
      { key: "done",  title: "Done" }
    ];
    var UI = {
      details: { en: "Details", ja: "詳細" },
      empty:   { en: "No cards", ja: "カードなし" }
    };

    // ---- Helpers ----
    // pick returns the string for `lang` from a bilingual object, falling back
    // to English then empty. Plain strings pass through unchanged.
    function pick(val, lang) {
      if (val == null) return "";
      if (typeof val === "string") return val;
      if (val[lang] != null) return val[lang];
      return val.en != null ? val.en : "";
    }
    function el(tag, cls, text) {
      var node = document.createElement(tag);
      if (cls) node.className = cls;
      if (text != null) node.textContent = text;
      return node;
    }

    // ---- Status chip: symbol + label together. ----
    function chip(status, lang) {
      var s = STATUS[status] || STATUS.none;
      var c = el("span", "chip " + s.cls);
      var sym = el("span", "chip__sym", s.sym);
      sym.setAttribute("aria-hidden", "true");
      c.appendChild(sym);
      c.appendChild(el("span", "chip__label", pick(s.label, lang)));
      return c;
    }

    // ---- Meter: thin green bar + written value/total label. ----
    function renderMeter(meter, lang) {
      var wrap = el("div", "meter");
      var track = el("div", "meter__track");
      var total = Number(meter.total) || 0;
      var value = Number(meter.value) || 0;
      var pct = total > 0 ? Math.max(0, Math.min(100, (value / total) * 100)) : 0;
      var fill = el("div", "meter__fill");
      fill.style.width = pct + "%";
      track.appendChild(fill);
      track.setAttribute("role", "progressbar");
      track.setAttribute("aria-valuenow", String(value));
      track.setAttribute("aria-valuemin", "0");
      track.setAttribute("aria-valuemax", String(total));
      var labelText = pick(meter.label, lang);
      var text = value + "/" + total + (labelText ? " " + labelText : "");
      track.setAttribute("aria-label", text);
      wrap.appendChild(track);
      wrap.appendChild(el("span", "meter__text", text));
      return wrap;
    }

    // ---- Summary card ----
    function renderSummaryCard(card, lang) {
      var art = el("article", "summary-card");
      art.appendChild(el("div", "summary-card__title", pick(card.title, lang)));
      art.appendChild(el("div", "summary-card__headline", pick(card.headline, lang)));
      if (card.badge && card.badge.href) {
        var a = el("a", "summary-card__badge", pick(card.badge.label, lang));
        a.href = card.badge.href;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        art.appendChild(a);
      }
      if (card.meter) art.appendChild(renderMeter(card.meter, lang));
      if (card.rows && card.rows.length) {
        var ul = el("ul", "card-rows");
        card.rows.forEach(function (row) {
          var li = el("li", "card-row");
          li.appendChild(el("span", "card-row__label", pick(row.label, lang)));
          li.appendChild(chip(row.status, lang));
          if (row.note) li.appendChild(el("span", "card-row__note", pick(row.note, lang)));
          ul.appendChild(li);
        });
        art.appendChild(ul);
      }
      return art;
    }

    // ---- Kanban card (a real <button> for keyboard access) ----
    function renderKanbanCard(card, lang) {
      var btn = el("button", "kanban-card");

      btn.setAttribute("aria-haspopup", "dialog");
      var head = el("div", "kanban-card__head");
      head.appendChild(el("span", "kanban-card__tag", pick(card.tag, lang)));
      var dateText = pick(card.date, lang);
      if (dateText) head.appendChild(el("span", "kanban-card__date", dateText));
      btn.appendChild(head);
      btn.appendChild(el("h3", "kanban-card__title", pick(card.title, lang)));
      var summary = el("p", "kanban-card__summary");
      summary.innerHTML = pick(card.summary, lang);   // trusted HTML
      btn.appendChild(summary);
      var aff = el("span", "kanban-card__affordance", pick(UI.details, lang));
      aff.setAttribute("aria-hidden", "true");
      btn.appendChild(aff);
      btn.addEventListener("click", function () { openDialog(card, lang, btn); });
      return btn;
    }

    // ---- Board ----
    function renderBoard(lang) {
      var board = document.getElementById("board");
      board.innerHTML = "";
      var data = REPORT.board || {};
      COLUMNS.forEach(function (col) {
        var items = data[col.key] || [];
        var column = el("div", "column");
        var header = el("div", "column__header");
        header.appendChild(el("h2", "column__title", col.title));
        header.appendChild(el("span", "column__count", String(items.length)));
        column.appendChild(header);
        var list = el("div", "column__cards");
        if (items.length === 0) {
          list.appendChild(el("div", "column__empty", pick(UI.empty, lang)));
        } else {
          items.forEach(function (c) { list.appendChild(renderKanbanCard(c, lang)); });
        }
        column.appendChild(list);
        board.appendChild(column);
      });
    }

    // ---- Header (period + method note) ----
    function renderHeader(lang) {
      document.getElementById("report-period").textContent = pick(REPORT.period, lang);
      document.getElementById("report-note").textContent = pick(REPORT.note, lang);
    }

    function render(lang) {
      renderHeader(lang);
      var row = document.getElementById("summary-cards");
      row.innerHTML = "";
      (REPORT.summaryCards || []).forEach(function (c) { row.appendChild(renderSummaryCard(c, lang)); });
      renderBoard(lang);
    }

    // ---- Dialog (modal card detail) ----
    var dialog = document.getElementById("card-dialog");
    var lastTrigger = null;

    function openDialog(card, lang, trigger) {
      lastTrigger = trigger || null;
      document.getElementById("dialog-tag").textContent = pick(card.tag, lang);
      var dateEl = document.getElementById("dialog-date");
      var dateText = pick(card.date, lang);
      dateEl.textContent = dateText;
      dateEl.style.display = dateText ? "" : "none";
      document.getElementById("dialog-title").textContent = pick(card.title, lang);
      document.getElementById("dialog-detail").innerHTML = pick(card.detail, lang);  // trusted HTML
      if (typeof dialog.showModal === "function") {
        dialog.showModal();
      } else {
        dialog.setAttribute("open", "");
      }
      // Move focus into the dialog; it returns to the trigger on close.
      var closeBtn = document.getElementById("dialog-close");
      if (closeBtn) closeBtn.focus();
    }
    // Esc closes natively; also close on backdrop click (target === dialog).
    dialog.addEventListener("click", function (e) {
      if (e.target === dialog) dialog.close();
    });
    dialog.addEventListener("close", function () {
      if (lastTrigger && typeof lastTrigger.focus === "function") lastTrigger.focus();
      lastTrigger = null;
    });
    document.getElementById("dialog-close").addEventListener("click", function () { dialog.close(); });

    // ---- Theme toggle ----
    function toggleTheme() {
      var html = document.documentElement;
      var current = html.getAttribute("data-color-scheme");
      var next;
      if (current === "auto") {
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        next = prefersDark ? "light" : "dark";
      } else {
        next = current === "dark" ? "light" : "dark";
      }
      html.setAttribute("data-color-scheme", next);
      try { localStorage.setItem("html-output-color-scheme", next); } catch (e) {}
    }

    // ---- Language switch ----
    function currentLang() {
      var l = document.documentElement.getAttribute("data-lang");
      return l === "ja" ? "ja" : "en";
    }
    function setLang(lang) {
      if (lang !== "en" && lang !== "ja") lang = "en";
      var html = document.documentElement;
      html.setAttribute("data-lang", lang);
      html.setAttribute("lang", lang);
      var titleEl = document.querySelector('.report-header h1[data-lang="' + lang + '"]');
      if (titleEl) document.title = titleEl.textContent.trim();
      try { localStorage.setItem("progress-report-tt-lang", lang); } catch (e) {}
      if (dialog.open) dialog.close();
      render(lang);
    }

    // ---- Wire controls (no inline handlers) ----
    document.querySelector(".theme-toggle").addEventListener("click", toggleTheme);
    document.querySelectorAll(".lang-btn").forEach(function (b) {
      b.addEventListener("click", function () { setLang(b.getAttribute("data-set-lang")); });
    });

    // ---- Initial render in the pre-paint language. ----
    render(currentLang());
  })();
</script>

</body>
</html>
